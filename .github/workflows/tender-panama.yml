name: Tender — Panama Water Intelligence

on:
  schedule:
    - cron: '0 11 * * 1-5'   # 06:00 AST = 11:00 UTC, Mon–Fri
  workflow_dispatch:           # manual trigger for testing

permissions:
  contents: write
  pull-requests: write

jobs:
  run-tender:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Anthropic SDK
        run: pip install --quiet 'anthropic>=0.40.0'

      - name: Create session and dispatch user.message
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AGENT_ID: ${{ vars.TENDER_AGENT_ID }}
          ENVIRONMENT_ID: ${{ vars.TENDER_ENVIRONMENT_ID }}
          VAULT_ID: ${{ vars.TENDER_VAULT_ID }}
        run: |
          python <<'PY'
          import os
          import sys
          import anthropic

          # Defensive: strip whitespace/newlines from every input. Pasting into
          # GitHub Settings often leaves a trailing \n which corrupts headers.
          def clean(name: str) -> str:
              v = os.environ.get(name, "")
              if not v:
                  sys.exit(f"::error::{name} is missing")
              cleaned = v.strip()
              if cleaned != v or any(ord(c) < 32 or ord(c) == 0x7f for c in cleaned):
                  print(f"::warning::{name} had whitespace/control chars; stripped")
              return cleaned

          api_key = clean("ANTHROPIC_API_KEY")
          agent_id = clean("AGENT_ID")
          environment_id = clean("ENVIRONMENT_ID")
          vault_id = clean("VAULT_ID")

          client = anthropic.Anthropic(api_key=api_key)

          session = client.beta.sessions.create(
              agent=agent_id,
              environment_id=environment_id,
              vault_ids=[vault_id],
          )
          print(f"session.id = {session.id}")
          print(f"session.status = {session.status}")

          client.beta.sessions.events.send(
              session.id,
              events=[{
                  "type": "user.message",
                  "content": [{
                      "type": "text",
                      "text": (
                          "Run the scheduled Panama water-intelligence task. "
                          "Pull active IDAAN tenders from PanamaCompra, normalize them, "
                          "and update public/central-america-tenders-live.json in the "
                          "MbethencourtM4X/advance-research repo via PR. Log notes to "
                          "the Atlas Brain Obsidian vault under 02_Projects/Advance/."
                      ),
                  }],
              }],
          )

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a") as f:
                  f.write("## Tender session dispatched\n")
                  f.write(f"- session_id: `{session.id}`\n")
                  f.write(f"- status at create: `{session.status}`\n")
                  f.write(
                      f"- dashboard: https://platform.claude.com/managed-agents/sessions/{session.id}\n"
                  )
          PY
