name: Scrape Central America Tenders

on:
  schedule:
    # weekday morning briefing — 06:00 AST (10:00 UTC) Mon–Fri
    - cron: '0 10 * * 1-5'
    # 3x additional daily runs at 06:30, 07:00, 08:00 AST (UTC-4)
    - cron: '30 10 * * *'
    - cron: '0 11 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      country:
        description: 'Country to scrape (all | nicaragua | costa_rica | panama)'
        required: false
        default: 'all'
      use_playwright:
        description: 'Force Playwright fallback (true | false)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        if: ${{ github.event.inputs.use_playwright == 'true' }}

      # ── Nicaragua ─────────────────────────────────────────────────────────
      - name: Scrape Nicaragua API (SISCAE)
        if: ${{ (github.event.inputs.country == 'all' || github.event.inputs.country == 'nicaragua' || github.event_name == 'schedule') && github.event.inputs.use_playwright != 'true' }}
        id: scrape_nic_api
        run: node scripts/scrape-nicaragua.js
        continue-on-error: true

      - name: Install Playwright for Nicaragua fallback
        if: ${{ steps.scrape_nic_api.outcome == 'failure' }}
        run: npx playwright install chromium --with-deps

      - name: Scrape Nicaragua Playwright (fallback)
        if: ${{ steps.scrape_nic_api.outcome == 'failure' || github.event.inputs.use_playwright == 'true' }}
        run: node scripts/scrape-nicaragua-playwright.js
        continue-on-error: true

      # ── Costa Rica ────────────────────────────────────────────────────────
      - name: Scrape Costa Rica API (SICOP)
        if: ${{ (github.event.inputs.country == 'all' || github.event.inputs.country == 'costa_rica' || github.event_name == 'schedule') && github.event.inputs.use_playwright != 'true' }}
        id: scrape_cr_api
        run: node scripts/scrape-costa-rica.js
        continue-on-error: true

      - name: Install Playwright for CR fallback
        if: ${{ steps.scrape_cr_api.outcome == 'failure' && steps.scrape_nic_api.outcome != 'failure' }}
        run: npx playwright install chromium --with-deps

      - name: Scrape Costa Rica Playwright (fallback)
        if: ${{ steps.scrape_cr_api.outcome == 'failure' || github.event.inputs.use_playwright == 'true' }}
        run: node scripts/scrape-costa-rica-playwright.js
        continue-on-error: true

      # ── Commit ────────────────────────────────────────────────────────────
      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/central-america-tenders-live.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push data update
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Advance Scraper Bot"
          git config user.email "scraper@advance-idan.bot"
          git add public/central-america-tenders-live.json
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "data: auto-update tenders [$TIMESTAMP]"
          git push

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "✓ No new tender data — no commit needed."

      - name: Workflow summary
        if: always()
        run: |
          echo "## Scrape Summary — $(date -u)" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import json, sys
          try:
              with open('public/central-america-tenders-live.json') as f:
                  d = json.load(f)
              print('| Country | Tenders | Last Updated |')
              print('|---|---|---|')
              ts = d.get('timestamp', '')
              for k, v in d.get('countries', {}).items():
                  n = len(v.get('tenders', []))
                  flag = v.get('flag', '')
                  status = '✅' if n > 0 else '⏳'
                  print(f'| {flag} {k} | {status} {n} | {ts[:10]} |')
          except Exception as e:
              print(f'Error reading data: {e}')
          " >> $GITHUB_STEP_SUMMARY
